<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>无线安全审计工具升级</title>
    <meta
      name="description"
      content="设备一键升级。"
    />
    <meta name="viewport" content="width=device-width" />
    <meta name="color-scheme" content="dark light" />
    <style>
      * { box-sizing: border-box; }
      body {
        font-family:
          -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto,
          Ubuntu, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        line-height: 1.6;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #1e3c72, #2a5298);
      }
      @media (prefers-color-scheme: light) {
        body { background: radial-gradient(circle at top, #e0eafc, #cfdef3); }
      }
      .card {
        background: rgba(255, 255, 255, 0.95);
        color: #222;
        max-width: 460px;
        width: calc(100% - 32px);
        padding: 40px 32px;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        .card { background: rgba(40, 44, 52, 0.95); color: #f5f5f5; }
      }
      .card h1 {
        margin: 0 0 8px;
        font-size: 1.6em;
        font-weight: 700;
      }
      .card p {
        margin: 0 0 28px;
        color: #666;
        font-size: 0.95em;
      }
      @media (prefers-color-scheme: dark) {
        .card p { color: #aaa; }
      }
      .install-wrapper {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }
      .tip {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
        font-size: 0.85em;
        color: #888;
      }
      @media (prefers-color-scheme: dark) {
        .tip { border-top-color: rgba(255, 255, 255, 0.1); color: #777; }
      }
      a { color: #2a5298; }
    </style>
    <script
      type="module"
      src="dist/web/install-button.js"
    ></script>
  </head>
  <body>
    <div class="card">
      <h1></h1>
      <p>将设备连接到电脑，点击下方按钮即可开始烧录。</p>

      <div class="install-wrapper">
        <esp-web-install-button
          manifest="json/manifest.json"
        >
          <i slot="unsupported">
            您的浏览器不支持 Web Serial，请使用 Chrome 或 Edge 打开此页面。
          </i>
        </esp-web-install-button>
      </div>

      <div class="tip">
        提示：需通过 HTTPS 访问，并使用支持 Web Serial 的浏览器。
      </div>
    </div>
    <script>
      {
        const search = new URLSearchParams(window.location.search);
        if (search.has("manifest")) {
          const button = document.querySelector("esp-web-install-button");
          button.manifest = search.get("manifest");
        }
      }
    </script>
  </body>
</html>
